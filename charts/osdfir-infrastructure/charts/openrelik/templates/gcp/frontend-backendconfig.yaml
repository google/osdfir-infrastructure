{{- if (eq .Values.global.ingress.className "gce") }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ .Release.Name }}-openrelik-frontend-backend-config
  namespace: {{ .Release.Namespace | quote }}
spec:
  timeoutSec: 300
  {{- if and .Values.config.iap.enabled .Values.config.iap.existingSecret }}
  iap:
    enabled: true
    oauthclientCredentials:
      secretName: {{ .Values.config.iap.existingSecret }}
  {{- end }}
  healthCheck:
    checkIntervalSec: 300
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /
    port: 8711
{{- end }}